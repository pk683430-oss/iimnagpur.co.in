<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px 16px;background:#f0f1f4;}
.card{width:100%;max-width:370px;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(26,42,74,0.13);border:0.5px solid #e4e5ea;}
.top{background:#fff;padding:20px 24px 16px;border-bottom:0.5px solid #e4e5ea;}
.top img{width:100%;max-width:220px;object-fit:contain;display:block;margin:0 auto 14px;}
.divider{height:0.5px;background:#e4e5ea;margin:0 0 12px;}
.committee-badge{display:inline-flex;align-items:center;gap:6px;background:#1a2a4a;color:#d4a84b;font-size:11px;font-weight:600;padding:5px 14px;border-radius:20px;letter-spacing:0.04em;text-transform:uppercase;}
.top-center{text-align:center;}
.body{padding:24px 20px;text-align:center;}
.label{font-size:10px;color:#9a9faf;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:18px;}
.profile-box{background:#f7f8fa;border-radius:14px;border:0.5px solid #e4e5ea;padding:20px;margin-bottom:16px;}
.photo{width:80px;height:80px;border-radius:12px;object-fit:cover;object-position:top;margin:0 auto 12px;display:block;border:2px solid #d4a84b;}
.name{font-size:17px;font-weight:600;color:#1d1f24;margin-bottom:4px;}
.role{font-size:12px;color:#6b7280;margin-bottom:14px;}
.badge{display:inline-flex;align-items:center;gap:5px;background:#e8f5ee;color:#15633d;font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;}
.info-table{width:100%;font-size:12px;border-collapse:collapse;margin-top:16px;border-top:0.5px solid #e4e5ea;}
.info-table td{padding:6px 0;color:#6b7280;}
.info-table td:last-child{text-align:right;color:#1d1f24;font-weight:500;}
.info-table tr:first-child td:last-child{color:#3b5bdb;}
.footer{padding:12px 20px;border-top:0.5px solid #e4e5ea;display:flex;justify-content:space-between;align-items:center;}
.footer span{font-size:11px;color:#9a9faf;}
</style>
</head>
